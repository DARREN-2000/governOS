name: Bug Report
description: Create a report to help us improve GovernOS
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running GovernOS?
      options:
        - Docker Compose
        - Native (Node/Python)
        - Render
        - Kubernetes
    validations:
      required: true
