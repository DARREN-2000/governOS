name: CI — Quality Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint:check
      - name: Build packages
        run: npm run build
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: Tests
        run: npm test
      - name: Format check
        run: npm run format:check
