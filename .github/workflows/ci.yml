name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}" || true

      - name: Type check
        run: |
          npx tsc -p packages/workflow-spec/tsconfig.build.json --noEmit
          npx tsc -p packages/action-sdk/tsconfig.build.json --noEmit
          npx tsc -p packages/policy/tsconfig.build.json --noEmit
          npx tsc -p packages/connectors/tsconfig.build.json --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: |
          cd packages/workflow-spec && npx jest --ci --coverage
          cd ../action-sdk && npx jest --ci --coverage
          cd ../policy && npx jest --ci --coverage
          cd ../connectors && npx jest --ci --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 20
        with:
          name: coverage-reports
          path: packages/*/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: |
          npx tsc -p packages/workflow-spec/tsconfig.build.json
          npx tsc -p packages/action-sdk/tsconfig.build.json
          npx tsc -p packages/policy/tsconfig.build.json
          npx tsc -p packages/connectors/tsconfig.build.json
          npx tsc -p packages/shared/tsconfig.build.json
          npx tsc -p apps/api/tsconfig.build.json
          npx tsc -p apps/worker/tsconfig.build.json
