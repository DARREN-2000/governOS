name: Deploy Web to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
      NEXT_PUBLIC_DEMO_MODE: false
      NEXT_PUBLIC_DEPLOY_ENV: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build monorepo
        run: npm run build

      - name: Build web package
        run: |
          set -e
          cd apps/web
          GITHUB_PAGES=true NEXT_PUBLIC_DEMO_MODE=true NEXT_PUBLIC_DEPLOY_ENV=github-pages npm run build

      - name: Assemble export
        run: |
          set -euo pipefail
          # Prefer Next's formal export locations
          if [ -d "apps/web/.next/output/export" ]; then
            rm -rf apps/web/out
            mkdir -p apps/web/out
            cp -r apps/web/.next/output/export/* apps/web/out/
            echo "Copied from .next/output/export"
          elif [ -d "apps/web/.next/export" ]; then
            rm -rf apps/web/out
            mkdir -p apps/web/out
            cp -r apps/web/.next/export/* apps/web/out/
            echo "Copied from .next/export"
          elif [ -d "apps/web/out" ]; then
            echo "Using existing apps/web/out"
          else
            # Assemble from .next server pages and static assets
            if [ -d "apps/web/.next/server/pages" ]; then
              rm -rf apps/web/out
              mkdir -p apps/web/out
              rsync -a --prune-empty-dirs --include '*/' --include '*.html' --exclude '*' apps/web/.next/server/pages/ apps/web/out/
              if [ -d "apps/web/.next/static" ]; then
                mkdir -p apps/web/out/_next
                cp -r apps/web/.next/static apps/web/out/_next/
              fi
              echo "Assembled apps/web/out from .next/server/pages"
            else
              echo "No export produced and .next/server/pages absent"
              ls -la apps/web/.next || true
              exit 1
            fi
          fi

      - name: Debug list export contents
        run: |
          echo "Listing apps/web/out"
          ls -la apps/web/out || echo "apps/web/out does not exist or is empty"

      - name: Deploy to gh-pages
        id: deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          publish_branch: gh-pages

      - name: Validate deployment
        run: |
          set -e
          echo "Deployment completed with status: ${{ steps.deploy.outcome }}"
          if [ "${{ steps.deploy.outcome }}" != "success" ]; then
            echo "⚠ Deployment failed"
            exit 1
          fi

          # Verify export was not empty
          if [ ! -f "apps/web/out/index.html" ]; then
            echo "⚠ Export missing index.html"
            exit 1
          fi

          if [ ! -d "apps/web/out/_next" ]; then
            echo "⚠ Export missing _next assets"
            exit 1
          fi

          echo "✓ Export validated successfully"
          echo "✓ Static assets present"
          echo "✓ Deployment to gh-pages successful"
          echo ""
          echo "Live demo available at: https://DARREN-2000.github.io/IntentGraph/"
