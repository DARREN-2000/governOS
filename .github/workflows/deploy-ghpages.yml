name: Deploy Web to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
      NEXT_PUBLIC_DEMO_MODE: false
      NEXT_PUBLIC_DEPLOY_ENV: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace (packages + apps)
        run: npm run build

      - name: Build web explicitly
        run: |
          set -e
          # Ensure Next builds the static export output in the web package
          cd apps/web
          GITHUB_PAGES=true NEXT_PUBLIC_DEMO_MODE=true NEXT_PUBLIC_DEPLOY_ENV=github-pages npm run build

      - name: Prepare export dir
        run: |
          set -euo pipefail
          candidates=("apps/web/.next/output/export" "apps/web/.next/export" "apps/web/out")
          found=0
          for export_dir in "${candidates[@]}"; do
            if [ -d "$export_dir" ]; then
              rm -rf apps/web/out
              mkdir -p apps/web/out
              cp -r "$export_dir"/* apps/web/out/
              found=1
              echo "Copied export from $export_dir"
              break
            fi
          done

          if [ "$found" -ne 1 ]; then
            if [ -d "apps/web/.next/server/pages" ]; then
              echo "No formal export found; assembling static output from .next/server/pages and .next/static"
              rm -rf apps/web/out
              mkdir -p apps/web/out

              # Use rsync to copy HTML files while preserving directory structure
              rsync -a --prune-empty-dirs --include '*/' --include '*.html' --exclude '*' apps/web/.next/server/pages/ apps/web/out/

              # Copy _next static assets so HTML can reference them
              if [ -d "apps/web/.next/static" ]; then
                mkdir -p apps/web/out/_next
                cp -r apps/web/.next/static apps/web/out/_next/
              fi

              found=1
              echo "Assembled export in apps/web/out"
            else
              echo "Export directory not found and .next/server/pages missing"
              ls -la apps/web/.next || true
              exit 1
            fi
          fi

      - name: Debug: list export contents
        run: |
          echo "Listing apps/web/out"
          ls -la apps/web/out || echo "apps/web/out does not exist or is empty"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          publish_branch: gh-pages
