name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
      NEXT_PUBLIC_DEMO_MODE: false
      NEXT_PUBLIC_DEPLOY_ENV: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build workspace (packages + apps)
        run: npm run build

      - name: Prepare export dir
        run: |
          set -e
          # Try multiple possible Next export locations (compat with different Next versions/configs)
          candidates=("apps/web/.next/output/export" "apps/web/.next/export" "apps/web/out")
          found=0
          for export_dir in "${candidates[@]}"; do
            if [ -d "$export_dir" ]; then
              rm -rf apps/web/out
              mkdir -p apps/web/out
              cp -r "$export_dir"/* apps/web/out/
              found=1
              echo "Copied export from $export_dir"
              break
            fi
          done
          if [ "$found" -ne 1 ]; then
            echo "Export directory not found in any candidate locations"
            ls -la apps/web/.next || true
            exit 1
          fi

      - name: Disable Jekyll
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
