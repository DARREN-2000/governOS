name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
      NEXT_PUBLIC_DEMO_MODE: true
      NEXT_PUBLIC_DEPLOY_ENV: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build workspace (packages + apps)
        run: npm run build

      - name: Assemble export dir
        run: |
          set -euo pipefail
          rm -rf apps/web/out
          mkdir -p apps/web/out

          if [ -d "apps/web/.next/server/pages" ]; then
            echo "Copying prerendered pages from .next/server/pages"
            rsync -a --prune-empty-dirs --include '*/' --include '*.html' --exclude '*' apps/web/.next/server/pages/ apps/web/out/
          else
            echo "Missing apps/web/.next/server/pages"
            ls -la apps/web/.next || true
            exit 1
          fi

          if [ -d "apps/web/.next/static" ]; then
            echo "Copying static assets from .next/static"
            mkdir -p apps/web/out/_next
            cp -r apps/web/.next/static apps/web/out/_next/
          else
            echo "Missing apps/web/.next/static"
            ls -la apps/web/.next || true
            exit 1
          fi

      - name: Debug export dir
        run: |
          echo "Listing apps/web/out"
          find apps/web/out -maxdepth 3 -type f | sed -n '1,200p'

      - name: Disable Jekyll
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
