<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IntentGraph animated system map</title>
  <desc id="desc">Animated network showing intent, policy, and workflow execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4e6" />
      <stop offset="50%" stop-color="#f2f7f5" />
      <stop offset="100%" stop-color="#e7f1f6" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a4c" />
      <stop offset="100%" stop-color="#1f8a8c" />
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="32" fill="url(#bg)" />
  <g opacity="0.35" stroke="#102327" stroke-width="1">
    <path d="M80 80H1120" />
    <path d="M80 170H1120" />
    <path d="M80 260H1120" />
    <path d="M80 350H1120" />
    <path d="M140 40V380" />
    <path d="M320 40V380" />
    <path d="M500 40V380" />
    <path d="M680 40V380" />
    <path d="M860 40V380" />
    <path d="M1040 40V380" />
  </g>
  <g stroke="url(#line)" stroke-width="2" stroke-dasharray="8 14" fill="none">
    <path d="M120 120 C 300 40 450 80 600 160">
      <animate attributeName="stroke-dashoffset" values="0;-140" dur="6s" repeatCount="indefinite" />
    </path>
    <path d="M260 280 C 420 220 640 240 840 180">
      <animate attributeName="stroke-dashoffset" values="0;-160" dur="7s" repeatCount="indefinite" />
    </path>
    <path d="M520 100 C 700 120 880 220 1040 300">
      <animate attributeName="stroke-dashoffset" values="0;-180" dur="8s" repeatCount="indefinite" />
    </path>
  </g>
  <g>
    <circle cx="120" cy="120" r="8" fill="#ff8a4c" />
    <circle cx="600" cy="160" r="8" fill="#1f8a8c" />
    <circle cx="260" cy="280" r="8" fill="#ffb86b" />
    <circle cx="840" cy="180" r="8" fill="#2b8ea0" />
    <circle cx="1040" cy="300" r="8" fill="#ff8a4c" />
  </g>
  <g>
    <circle cx="120" cy="120" r="10" stroke="#ff8a4c" stroke-width="2" fill="none" opacity="0.7">
      <animate attributeName="r" values="10;18;10" dur="3.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="160" r="10" stroke="#1f8a8c" stroke-width="2" fill="none" opacity="0.7">
      <animate attributeName="r" values="10;18;10" dur="3.6s" repeatCount="indefinite" begin="0.6s" />
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.6s" repeatCount="indefinite" begin="0.6s" />
    </circle>
    <circle cx="840" cy="180" r="10" stroke="#2b8ea0" stroke-width="2" fill="none" opacity="0.7">
      <animate attributeName="r" values="10;18;10" dur="3.4s" repeatCount="indefinite" begin="1.2s" />
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.4s" repeatCount="indefinite" begin="1.2s" />
    </circle>
  </g>
  <g>
    <rect x="180" y="48" width="220" height="56" rx="18" fill="#ffffff" stroke="#f2c2a8" />
    <text x="210" y="82" font-size="16" fill="#9a4b22" font-family="Arial, sans-serif">Intent intake</text>
    <rect x="520" y="260" width="220" height="56" rx="18" fill="#ffffff" stroke="#9ad0cf" />
    <text x="550" y="294" font-size="16" fill="#1f6f6f" font-family="Arial, sans-serif">Policy checks</text>
    <rect x="820" y="60" width="240" height="56" rx="18" fill="#ffffff" stroke="#9fb8ba" />
    <text x="850" y="94" font-size="16" fill="#2a5254" font-family="Arial, sans-serif">Execution + audit</text>
  </g>
</svg>
