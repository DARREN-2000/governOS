<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trust layer animation</title>
  <desc id="desc">Animated rings showing preview, policy, and audit layers.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a4c" />
      <stop offset="100%" stop-color="#1f8a8c" />
    </linearGradient>
  </defs>
  <rect width="960" height="260" rx="28" fill="#f3efe9" />
  <g transform="translate(160 130)">
    <circle r="70" stroke="url(#ring)" stroke-width="6" fill="none" stroke-dasharray="10 12">
      <animate attributeName="stroke-dashoffset" values="0;-160" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle r="45" stroke="#1f8a8c" stroke-width="4" fill="none" stroke-dasharray="8 10">
      <animate attributeName="stroke-dashoffset" values="0;120" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle r="22" stroke="#ff8a4c" stroke-width="4" fill="none" />
    <circle r="8" fill="#1f8a8c">
      <animate attributeName="r" values="8;12;8" dur="2.8s" repeatCount="indefinite" />
    </circle>
  </g>
  <g font-family="Arial, sans-serif" fill="#2a5254" font-size="16">
    <text x="300" y="90">Preview</text>
    <text x="300" y="130">Policy</text>
    <text x="300" y="170">Audit</text>
  </g>
  <g fill="#2a5254" font-size="12" font-family="Arial, sans-serif">
    <text x="300" y="110">Typed action previews before execution</text>
    <text x="300" y="150">Approval gates for risky workflows</text>
    <text x="300" y="190">Immutable event trail for every run</text>
  </g>
</svg>
