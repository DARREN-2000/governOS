<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow loop animation</title>
  <desc id="desc">Animated pipeline showing intent to approval to execution.</desc>
  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a4c" />
      <stop offset="100%" stop-color="#1f8a8c" />
    </linearGradient>
  </defs>
  <rect width="960" height="260" rx="28" fill="#f7f3ea" />
  <g stroke="#e2d7cc" stroke-width="2" stroke-dasharray="6 10">
    <path d="M120 130H840" />
  </g>
  <g>
    <rect x="80" y="70" width="180" height="70" rx="18" fill="#ffffff" stroke="#f1b68f" />
    <text x="110" y="112" font-size="16" fill="#9a4b22" font-family="Arial, sans-serif">Intent</text>

    <rect x="310" y="70" width="180" height="70" rx="18" fill="#ffffff" stroke="#9ad0cf" />
    <text x="340" y="112" font-size="16" fill="#1f6f6f" font-family="Arial, sans-serif">Plan</text>

    <rect x="540" y="70" width="180" height="70" rx="18" fill="#ffffff" stroke="#9ad0cf" />
    <text x="570" y="112" font-size="16" fill="#1f6f6f" font-family="Arial, sans-serif">Approve</text>

    <rect x="770" y="70" width="120" height="70" rx="18" fill="#ffffff" stroke="#f1b68f" />
    <text x="792" y="112" font-size="16" fill="#9a4b22" font-family="Arial, sans-serif">Run</text>
  </g>
  <circle r="7" fill="url(#track)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M120 130 H840" />
  </circle>
  <circle r="4" fill="#1f8a8c">
    <animateMotion dur="6s" repeatCount="indefinite" begin="1s" path="M120 130 H840" />
  </circle>
</svg>
