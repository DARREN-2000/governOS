<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Packet Path Definition -->
    <path id="path1" d="M 250 200 L 400 200 L 550 200" fill="transparent" />
    <path id="path2" d="M 400 200 L 400 320" fill="transparent" />
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#000000" rx="16"/>

  <!-- Subtle Grid lines for 'technical' feel -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300" />
    <path d="M 200 0 L 200 400 M 400 0 L 400 400 M 600 0 L 600 400" />
  </g>

  <!-- Glowing background effect with pulse animation -->
  <circle cx="400" cy="200" r="150" fill="#6d28d9" opacity="0.1" filter="blur(40px)">
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Connections -->
  <path d="M 250 200 L 400 200 L 550 200" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 400 200 L 400 320" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Animated Data Packets -->
  <circle cx="0" cy="0" r="3" fill="#3b82f6">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#path1"/>
    </animateMotion>
  </circle>

  <circle cx="0" cy="0" r="3" fill="#8b5cf6">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1s">
      <mpath href="#path2"/>
    </animateMotion>
  </circle>

  <!-- Node 1: Planner -->
  <g transform="translate(130, 160)">
    <rect width="120" height="80" fill="#0a0a0a" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="60" y="45" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Planner</text>
    <circle cx="120" cy="40" r="4" fill="#3b82f6">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2: Trust Layer (GovernOS) -->
  <g transform="translate(320, 140)">
    <rect width="160" height="120" fill="#0a0a0a" stroke="#6d28d9" stroke-width="2" rx="12"/>
    <rect width="160" height="120" fill="#6d28d9" opacity="0.05" rx="12"/>
    <text x="80" y="45" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">Trust Layer</text>
    <text x="80" y="65" fill="#94a3b8" font-family="monospace" font-size="12" text-anchor="middle">Policy Engine</text>
    <text x="80" y="85" fill="#94a3b8" font-family="monospace" font-size="12" text-anchor="middle">RBAC / Approvals</text>
    <circle cx="0" cy="60" r="4" fill="#8b5cf6">
        <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="60" r="4" fill="#8b5cf6">
        <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </circle>
  </g>

  <!-- Node 3: Execution -->
  <g transform="translate(550, 160)">
    <rect width="120" height="80" fill="#0a0a0a" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="60" y="45" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Execution</text>
    <circle cx="0" cy="40" r="4" fill="#10b981">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 4: DB -->
  <g transform="translate(340, 320)">
    <rect width="120" height="50" fill="#0a0a0a" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="60" y="30" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Audit Log</text>
  </g>
</svg>
