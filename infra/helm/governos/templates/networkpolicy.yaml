{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "governos.fullname" . }}
  labels:
    {{- include "governos.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "governos.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "governos.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 7233
        - protocol: TCP
          port: 443
{{- end }}
