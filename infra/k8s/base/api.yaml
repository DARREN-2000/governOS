apiVersion: v1
kind: Namespace
metadata:
  name: governos
  labels:
    app.kubernetes.io/name: governos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: governos-config
  namespace: governos
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3001"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governos-api
  namespace: governos
  labels:
    app: governos
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: governos
      component: api
  template:
    metadata:
      labels:
        app: governos
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: governos/api:0.1.0
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: governos-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: governos-api
  namespace: governos
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      name: http
  selector:
    app: governos
    component: api
