services:
  - type: web
    name: governos-python-api
    env: python
    buildCommand: "pip install poetry && poetry config virtualenvs.create false && poetry install --no-interaction --no-ansi"
    startCommand: "python -m uvicorn governos.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: governos-node-api
    env: node
    buildCommand: "npm install -g pnpm && cd apps/api && pnpm install && pnpm run build"
    startCommand: "cd apps/api && pnpm start"
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PYTHON_API_URL
        fromService:
          type: web
          name: governos-python-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: governos-web
    env: static
    buildCommand: "npm install -g pnpm && cd apps/web && pnpm install && pnpm run build"
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: governos-node-api
          envVarKey: RENDER_EXTERNAL_URL
